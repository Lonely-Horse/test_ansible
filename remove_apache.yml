---
- hosts: all
  become: true
  tasks:

  - name: update reposity index
    apt:
      update_cache: yes
    when: ansible_distribution in ["Ubuntu","Debian"]

  - name: install apache2 package
    apt:
      name: apache2
      state: absent
    when: ansible_distribution in ["Ubuntu","Debian"]

  - name: add php support for apache
    apt:
      name: libapache2-mod-php
      state: absent
    when: ansible_distribution in ["Ubuntu","Debian"]

  - name: update reposity index
    dnf:
      update_cache: yes
    when: ansible_distribution in ["Rocky","Centos","Fedora"]
  - name: install httpd package
    dnf:
      name: httpd
      state: absent
    when: ansible_distribution in ["Rocky","Fedora","Centos"]

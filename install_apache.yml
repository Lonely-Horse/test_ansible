---
- hosts: all
  become: true
  tasks:

  - name: update reposity index
    apt:
      update_cache: yes
    when: ansible_distribution in ["Debian","Ubuntu"]

  - name: install apache2 package
    apt:
      name: apache2
      state: latest
    when: ansible_distribution in ["Debian","Ubuntu"]

  - name: add php support for apache
    apt:
      name: libapache2-mod-php
      state: latest
    when: ansible_distribution in ["Debian","Ubuntu"]

  - name: update reposity index
    dnf:
      update_cache: yes
    when: ansible_distribution in ["Fedora","Rocky","Centos"]

  - name: install httpd package
    dnf:
      name: httpd
      state: latest
    when: ansible_distribution in ["Fedora","Rocky","Centos"]

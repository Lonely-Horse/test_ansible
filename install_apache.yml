---
- hosts: all
  become: true
  tasks:

  - name: update reposity index
    apt:
      update_cache: yes
    when: ansible_distribution in ["Debian","Ubuntu"]

  - name: install apache2 package and libapache2-mod-php package for Ubuntu
    apt:
      name:
        - apache2
        - libapache2-mod-php
      state: latest
    when: ansible_distribution in ["Debian","Ubuntu"]

  - name: update reposity index
    dnf:
      update_cache: yes
    when: ansible_distribution in ["Fedora","Rocky","CentOS"]

  - name: update reposity index
    dnf:
      update_cache: yes
    when: ansible_distribution in ["Fedora","Rocky","Centos"]

  - name: install httpd package and php package for CentOS
    dnf:
      name:
        - httpd
        - php
      state: latest
    when: ansible_distribution in ["Fedora","Rocky","Centos"]

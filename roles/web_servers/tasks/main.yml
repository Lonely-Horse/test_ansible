- name: install nginx
  tags: nginx
  package:
    name:
      - "{{ nginx_package_name }}"
    state: latest
  notify: restart_nginx

- name: start nginx
  tags: nginx
  service:
    name: "{{ nginx_service }}"
    state: started
    enabled: yes

- name: copy default html file for site
  tags: nginx
  copy:
    src: default_site.html
    dest: /usr/share/nginx/html/index.html
    owner: root
    group: root
    mode: 0644


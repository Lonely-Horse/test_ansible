---

- hosts: all
  become: true
  pre_tasks:

  - name: install updates ("CentOS","Rocky","Fedora")
    tags: always
    dnf:
      update_only: yes
      update_cache: yes
    when: ansible_distribution in ["CentOS","Rocky","Fedora"]
  - name: install updates ("Debian","Ubuntu")
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution in ["Debian","Ubuntu"]

  - name: create lonelyhorse user
    tags: always
    user:
      name: lonelyhorse
      groups: root
    when: ansible_distribution in ["Debian","Ubuntu"]

  - name: add user ssh-key
    tags: always
    authorized_key:
      user: lonelyhorse
      key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJMIc8KIVvwtLFjytKeLqD4C5i4oEmpzPLbikAYkKuCL ansible"
    when: ansible_distribution in ["Debian","Ubuntu"]
  - name: add a sudoer file for lonelyhorse
    copy:
      src: sudoer_lonelyhorse
      dest: /etc/sudoers.d/lonelyhorse
      owner: root
      group: root
      mode: 0440
    when: ansible_distribution in ["Debian","Ubuntu"]

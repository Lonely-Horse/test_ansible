---

- hosts: all
  become: true
  pre_tasks:

  - name: install updates (CentOS,Rocky,Fedora)
    tags: always
    dnf:
      update_cache: yes
    changed_when: false
    when: ansible_distribution in ["CentOS","Rocky","Fedora"]

  - name: install updates (Debian,Ubuntu)
    tags: always
    apt:
      update_cache: yes
    changed_when: false
    when: ansible_distribution in ["Debian","Ubuntu"]

  - name: install updates (Alpine Linux)
    tags: always
    ansible.builtin.apk:
      update_cache: yes
    when: ansible_distribution == "Alpine"

- hosts: all
  become: true
  roles:
    - base

- hosts: workstation
  become: true
  roles:
    - workstation

- hosts: web_servers
  become: true
  roles:
    - web_servers
